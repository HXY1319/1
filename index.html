<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#07c160">
<title>环境巡检</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{
    --green:#07c160; --green-d:#06ad56; --green-l:#e8f8ef;
    --red:#fa5151; --red-l:#fdecec;
    --orange:#ff9d3b;
    --t1:#1a1a1a; --t2:#666; --t3:#999;
    --bg:#f4f5f7; --card:#fff; --line:#ececec;
  }
  html,body{ background:var(--bg); color:var(--t1); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; font-size:15px; line-height:1.5; }
  body{ min-height:100vh; padding-bottom:96px; }
  .wrap{ max-width:640px; margin:0 auto; padding:0 14px; }

  /* 顶部区域条 */
  .topbar{ background:var(--green); color:#fff; padding:14px 16px calc(14px + env(safe-area-inset-top)); padding-top:calc(14px + env(safe-area-inset-top)); }
  .topbar .ttl{ font-size:13px; opacity:.9; display:flex; align-items:center; gap:6px; }
  .topbar .area{ font-size:22px; font-weight:600; margin-top:4px; }
  .topbar .area .tag{ display:inline-block; font-size:12px; background:rgba(255,255,255,.22); padding:2px 8px; border-radius:10px; margin-left:8px; vertical-align:middle; font-weight:400; }

  /* 进度条 */
  .prog{ background:var(--card); }
  .prog .bar{ height:4px; background:var(--line); position:relative; }
  .prog .bar i{ display:block; height:100%; width:0; background:var(--green); transition:width .3s; }
  .prog .txt{ padding:9px 16px; font-size:12px; color:var(--t3); display:flex; justify-content:space-between; }

  .card{ background:var(--card); border-radius:12px; margin-top:12px; overflow:hidden; }
  .card .h{ padding:14px 16px 6px; font-size:15px; font-weight:600; display:flex; align-items:center; gap:7px; }
  .card .h .dot{ width:4px; height:14px; background:var(--green); border-radius:2px; }
  .card .h .sub{ font-size:12px; color:var(--t3); font-weight:400; margin-left:auto; }

  /* 输入项 */
  .row{ padding:12px 16px; border-top:1px solid var(--line); display:flex; align-items:center; gap:12px; }
  .row:first-of-type{ border-top:none; }
  .row label{ width:78px; color:var(--t2); font-size:14px; flex-shrink:0; }
  .row input[type=text]{ flex:1; border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-size:14px; background:#fafafa; }
  .row input[type=text]:focus{ outline:none; border-color:var(--green); background:#fff; }
  .row .val{ flex:1; font-size:14px; color:var(--t1); }

  /* 检查项 */
  .item{ padding:13px 16px; border-top:1px solid var(--line); }
  .item:first-of-type{ border-top:none; }
  .item .name{ font-size:15px; margin-bottom:9px; display:flex; align-items:center; gap:8px; }
  .item .name .idx{ width:18px; height:18px; border-radius:50%; background:var(--green-l); color:var(--green-d); font-size:11px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
  .opts{ display:flex; gap:10px; }
  .opts button{ flex:1; padding:10px 0; border:1.5px solid var(--line); background:#fff; border-radius:8px; font-size:14px; color:var(--t2); display:flex; align-items:center; justify-content:center; gap:5px; transition:all .15s; }
  .opts button .ico{ width:16px; height:16px; border-radius:50%; border:1.5px solid currentColor; display:inline-flex; align-items:center; justify-content:center; font-size:11px; }
  .opts button.on.pass{ border-color:var(--green); background:var(--green-l); color:var(--green-d); }
  .opts button.on.pass .ico{ background:var(--green); border-color:var(--green); color:#fff; }
  .opts button.on.fail{ border-color:var(--red); background:var(--red-l); color:var(--red); }
  .opts button.on.fail .ico{ background:var(--red); border-color:var(--red); color:#fff; }
  .item .desc{ margin-top:8px; display:none; }
  .item .desc.show{ display:block; }
  .item .desc textarea{ width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-size:13px; min-height:56px; resize:none; background:#faffaf8; }
  .item .desc textarea:focus{ outline:none; border-color:var(--orange); background:#fff; }

  /* 照片 */
  .photo-box{ padding:0 16px 14px; }
  .photo-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:9px; }
  .photo-grid .ph{ position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; background:#f4f4f4; }
  .photo-grid .ph img{ width:100%; height:100%; object-fit:cover; }
  .photo-grid .ph .del{ position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,.5); color:#fff; border:none; font-size:13px; display:flex; align-items:center; justify-content:center; }
  .photo-add{ aspect-ratio:1; border:1.5px dashed #d0d0d0; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--t3); gap:4px; background:#fafafa; }
  .photo-add .plus{ font-size:26px; line-height:1; }
  .photo-add span{ font-size:11px; }
  .photo-note{ font-size:12px; color:var(--t3); margin-top:8px; }

  textarea.note{ width:100%; border:1px solid var(--line); border-radius:8px; padding:10px; font-size:14px; min-height:72px; resize:none; margin:8px 16px 14px; width:calc(100% - 32px); background:#fafafa; }
  textarea.note:focus{ outline:none; border-color:var(--green); background:#fff; }

  /* 底部提交 */
  .foot{ position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,.96); backdrop-filter:blur(8px); border-top:1px solid var(--line); padding:10px 14px calc(10px + env(safe-area-inset-bottom)); z-index:50; }
  .foot .inner{ max-width:640px; margin:0 auto; display:flex; gap:10px; }
  .foot button{ flex:1; padding:13px 0; border:none; border-radius:10px; font-size:16px; font-weight:600; }
  .foot .btn-history{ background:#f4f4f4; color:var(--t2); flex:0 0 92px; }
  .foot .btn-submit{ background:var(--green); color:#fff; }
  .foot .btn-submit:active{ background:var(--green-d); }
  .foot .btn-submit[disabled]{ background:#9ad8b6; }

  /* 成功页 */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .overlay.show{ display:flex; }
  .okbox{ background:#fff; border-radius:16px; padding:28px 24px 20px; max-width:340px; width:100%; text-align:center; }
  .okbox .ck{ width:62px; height:62px; border-radius:50%; background:var(--green-l); margin:0 auto 14px; display:flex; align-items:center; justify-content:center; }
  .okbox .ck svg{ width:32px; height:32px; }
  .okbox h2{ font-size:19px; margin-bottom:6px; }
  .okbox p{ font-size:13px; color:var(--t3); margin-bottom:18px; }
  .okbox .sum{ background:#fafafa; border-radius:10px; padding:12px; text-align:left; font-size:13px; color:var(--t2); margin-bottom:18px; }
  .okbox .sum div{ display:flex; justify-content:space-between; padding:3px 0; }
  .okbox .sum b{ color:var(--t1); font-weight:500; }
  .okbox .sum .fail-n{ color:var(--red); }
  .okbox .actions{ display:flex; gap:10px; }
  .okbox .actions button{ flex:1; padding:11px 0; border-radius:9px; font-size:15px; border:none; }
  .okbox .btn-again{ background:#f4f4f4; color:var(--t2); }
  .okbox .btn-done{ background:var(--green); color:#fff; }

  /* 历史记录 */
  .hist-overlay{ position:fixed; inset:0; background:var(--bg); z-index:90; display:none; flex-direction:column; }
  .hist-overlay.show{ display:flex; }
  .hist-head{ background:#fff; padding:14px 16px; padding-top:calc(14px + env(safe-area-inset-top)); display:flex; align-items:center; border-bottom:1px solid var(--line); }
  .hist-head .back{ font-size:15px; color:var(--green); margin-right:6px; }
  .hist-head h3{ font-size:17px; font-weight:600; }
  .hist-list{ flex:1; overflow-y:auto; padding:12px 14px; -webkit-overflow-scrolling:touch; }
  .hist-card{ background:#fff; border-radius:10px; padding:13px 14px; margin-bottom:10px; }
  .hist-card .hc-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .hist-card .hc-area{ font-size:15px; font-weight:600; }
  .hist-card .hc-time{ font-size:12px; color:var(--t3); }
  .hist-card .hc-meta{ font-size:12px; color:var(--t2); display:flex; gap:14px; }
  .hist-card .hc-meta .fail{ color:var(--red); }
  .hist-card .hc-meta .pass{ color:var(--green-d); }
  .hist-empty{ text-align:center; color:var(--t3); padding:60px 0; font-size:14px; }
  .hist-clear{ text-align:center; padding:18px; color:var(--red); font-size:13px; }

  .toast{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.78); color:#fff; padding:11px 18px; border-radius:9px; font-size:14px; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; }
  .toast.show{ opacity:1; }

  /* 二维码面板 */
  .qr-panel{ position:fixed; inset:0; background:var(--bg); z-index:85; display:none; flex-direction:column; }
  .qr-panel.show{ display:flex; }
  .qr-panel .qr-head{ background:#fff; padding:14px 16px; padding-top:calc(14px + env(safe-area-inset-top)); display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); flex-shrink:0; }
  .qr-panel .qr-head h3{ font-size:17px; font-weight:600; }
  .qr-panel .qr-head button{ background:none; border:none; font-size:15px; color:var(--green); }
  .qr-panel .qr-body{ flex:1; overflow-y:auto; padding:12px 14px 20px; -webkit-overflow-scrolling:touch; }
  .qr-panel .qr-body label{ display:block; font-size:13px; color:var(--t2); margin-bottom:5px; font-weight:500; }
  .qr-panel .qr-body input[type=text],
  .qr-panel .qr-body textarea{ width:100%; border:1px solid var(--line); border-radius:8px; padding:10px; font-size:14px; font-family:inherit; background:#fafafa; margin-bottom:10px; }
  .qr-panel .qr-body textarea{ min-height:90px; resize:vertical; }
  .qr-panel .qr-body .hint{ font-size:12px; color:var(--t3); margin:-6px 0 12px; }
  .qr-panel .qr-body .btn-row{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .qr-panel .qr-body .btn-row button{ padding:10px 14px; border:none; border-radius:8px; font-size:13px; font-weight:500; }
  .qr-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  .qr-card{ background:#fff; border-radius:10px; padding:12px; text-align:center; }
  .qr-card img{ width:120px; height:120px; margin-bottom:8px; }
  .qr-card .n{ font-size:14px; font-weight:600; margin-bottom:2px; }
  .qr-card .u{ font-size:9px; color:#aaa; word-break:break-all; }
  .qr-empty{ text-align:center; color:#aaa; padding:40px 0; font-size:13px; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="ttl">环境巡检 · 扫码填报</div>
      <div class="area"><span id="areaName">未指定区域</span><span class="tag" id="areaTag">请扫码</span></div>
    </div>
    <button onclick="toggleQR()" style="background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:14px;padding:5px 12px;font-size:12px;flex-shrink:0;margin-top:2px">生成二维码</button>
  </div>
</div>

<div class="prog">
  <div class="bar"><i id="progBar"></i></div>
  <div class="txt"><span>检查进度</span><span id="progTxt">0 / 0</span></div>
</div>

<div class="wrap">

  <div class="card">
    <div class="h"><span class="dot"></span>巡检信息<span class="sub">免登录 · 提交即记录</span></div>
    <div class="row">
      <label>巡检人</label>
      <input type="text" id="inspector" placeholder="填写你的姓名" maxlength="20">
    </div>
    <div class="row">
      <label>巡检时间</label>
      <span class="val" id="timeNow">—</span>
    </div>
  </div>

  <div class="card">
    <div class="h"><span class="dot"></span>卫生检查项<span class="sub">逐项判定</span></div>
    <div id="itemList"></div>
  </div>

  <div class="card">
    <div class="h"><span class="dot"></span>现场照片<span class="sub">最多3张 · 可选</span></div>
    <div class="photo-box">
      <div class="photo-grid" id="photoGrid">
        <label class="photo-add" id="photoAdd">
          <span class="plus">+</span><span>拍照/相册</span>
          <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none">
        </label>
      </div>
      <div class="photo-note">有问题的点位建议拍照留证，提交后便于跟进整改。</div>
    </div>
  </div>

  <div class="card">
    <div class="h"><span class="dot"></span>整体备注<span class="sub">可选</span></div>
    <textarea class="note" id="remark" placeholder="补充说明：如需报修、整体评价等"></textarea>
  </div>

</div>

<div class="foot">
  <div class="inner">
    <button class="btn-history" onclick="openHistory()">巡检记录</button>
    <button class="btn-submit" id="submitBtn" onclick="submit()">提交巡检</button>
  </div>
</div>

<!-- 成功弹层 -->
<div class="overlay" id="okOverlay">
  <div class="okbox">
    <div class="ck"><svg viewBox="0 0 48 48" fill="none"><path d="M14 25l7 7 13-14" stroke="#07c160" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h2>提交成功</h2>
    <p id="okTip">本次巡检已记录</p>
    <div class="sum" id="okSum"></div>
    <div class="actions">
      <button class="btn-again" onclick="closeOk()">继续巡检</button>
      <button class="btn-done" onclick="openHistory()">查看记录</button>
    </div>
  </div>
</div>

<!-- 历史记录 -->
<div class="hist-overlay" id="histOverlay">
  <div class="hist-head">
    <span class="back" onclick="closeHistory()">‹ 返回</span>
    <h3>巡检记录</h3>
  </div>
  <div class="hist-list" id="histList"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 二维码生成面板 -->
<div class="qr-panel" id="qrPanel">
  <div class="qr-head">
    <h3>批量生成巡检二维码</h3>
    <button onclick="toggleQR()">关闭</button>
  </div>
  <div class="qr-body">
    <label>第 1 步：填写当前页面地址</label>
    <input type="text" id="qrBaseUrl" placeholder="如 https://域名/index.html">
    <div class="hint">就是 index.html 部署后的网址，去掉 ?area= 及之后部分。如果不知道，复制浏览器地址栏里 index.html 前面的部分即可。</div>
    <label>第 2 步：输入区域名称（每行一个）</label>
    <textarea id="qrAreas" placeholder="一楼大厅&#10;二楼会议室A&#10;二楼茶水间&#10;三楼男卫生间">一楼大厅
二楼会议室A
二楼茶水间
三楼男卫生间
一楼消防通道</textarea>
    <div class="hint">每个区域占一行。名称里不要有 ? & # 等特殊符号。</div>
    <div class="btn-row">
      <button onclick="genQRCodes()" style="background:var(--green);color:#fff;">生成二维码</button>
      <button onclick="clearQRCodes()" style="background:#f4f4f4;color:var(--t2)">清空</button>
      <button onclick="window.print()" style="background:#fff;color:var(--green);border:1px solid var(--green);">打印</button>
    </div>
    <div class="qr-grid" id="qrGrid"><div class="qr-empty">填好地址和区域名，点生成</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
</script>

<script>
/* ========= 配置区（按需修改） ========= */
const CONFIG = {
  // 生产模式：填入后端接口地址（如 https://你的域名/api/inspect），留空则用本地存储演示
  API_ENDPOINT: "",
  // 检查项，可增删改
  ITEMS: [
    "地面清洁无杂物",
    "桌面台面整洁",
    "垃圾桶已清理/分类",
    "门窗玻璃干净",
    "物品摆放有序",
    "通风良好无异味",
    "消防通道畅通",
    "应急设备完好"
  ],
  // 企业微信群机器人 webhook（可选，留空不推送）。填了会在提交时通知群里
  WECOM_WEBHOOK: ""
};
/* ==================================== */

const params = new URLSearchParams(location.search);
let area = (params.get("area") || "").trim();
// 兼容中文字符未编码的情况
if(!area){ const m = location.href.match(/[?&]area=([^&]+)/); if(m) area = decodeURIComponent(m[1]).trim(); }
area = area || "";

const $ = id => document.getElementById(id);
let photos = [];        // base64 数组
let itemState = {};     // {idx:{status,desc}}

function fmtTime(d){
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function init(){
  // 区域
  if(area){
    $("areaName").textContent = area;
    $("areaTag").textContent = "扫码进入";
    $("areaTag").style.display = "inline-block";
  }else{
    $("areaName").textContent = "未指定区域";
    $("areaTag").textContent = "请从区域二维码扫码进入";
  }
  // 时间
  $("timeNow").textContent = fmtTime(new Date());
  setInterval(()=>{ $("timeNow").textContent = fmtTime(new Date()); }, 30000);
  // 巡检人记忆
  const last = localStorage.getItem("env_inspector");
  if(last) $("inspector").value = last;
  // 检查项
  renderItems();
  updateProgress();
}

function renderItems(){
  const list = $("itemList");
  list.innerHTML = "";
  CONFIG.ITEMS.forEach((name,i)=>{
    itemState[i] = {status:"", desc:""};
    const el = document.createElement("div");
    el.className = "item";
    el.innerHTML = `
      <div class="name"><span class="idx">${i+1}</span>${name}</div>
      <div class="opts">
        <button data-i="${i}" data-v="pass"><span class="ico">✓</span>合格</button>
        <button data-i="${i}" data-v="fail"><span class="ico">✕</span>不合格</button>
      </div>
      <div class="desc" id="desc-${i}"><textarea placeholder="说明该处问题（便于整改）" maxlength="200"></textarea></div>
    `;
    list.appendChild(el);
  });
  list.querySelectorAll(".opts button").forEach(btn=>{
    btn.addEventListener("click", e=>{
      const i = +btn.dataset.i, v = btn.dataset.v;
      itemState[i].status = v;
      btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("on","pass","fail"));
      btn.classList.add("on", v);
      $("desc-"+i).classList.toggle("show", v==="fail");
      updateProgress();
    });
  });
  list.querySelectorAll(".desc textarea").forEach((ta,i)=>{
    ta.addEventListener("input", e=>{ itemState[i].desc = e.target.value; });
  });
}

function updateProgress(){
  const total = CONFIG.ITEMS.length;
  const done = Object.values(itemState).filter(s=>s.status).length;
  $("progBar").style.width = (done/total*100)+"%";
  $("progTxt").textContent = `${done} / ${total}`;
  $("submitBtn").disabled = done < total;
}

/* 照片 */
$("photoInput").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;
  if(photos.length >= 3){ toast("最多3张照片"); return; }
  const b64 = await resizeImage(file, 1024, 0.72);
  photos.push(b64);
  e.target.value = "";
  renderPhotos();
});
function resizeImage(file, max, q){
  return new Promise(res=>{
    const r = new FileReader();
    r.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let {width:w, height:h} = img;
        if(w > h && w > max){ h = h*max/w; w = max; }
        else if(h > max){ w = w*max/h; h = max; }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        res(c.toDataURL("image/jpeg", q));
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  });
}
function renderPhotos(){
  const grid = $("photoGrid");
  grid.querySelectorAll(".ph").forEach(n=>n.remove());
  photos.forEach((src,i)=>{
    const d = document.createElement("div");
    d.className = "ph";
    d.innerHTML = `<img src="${src}"><button class="del" onclick="delPhoto(${i})">×</button>`;
    grid.insertBefore(d, $("photoAdd"));
  });
  $("photoAdd").style.display = photos.length >= 3 ? "none" : "flex";
}
function delPhoto(i){ photos.splice(i,1); renderPhotos(); }

/* 提交 */
async function submit(){
  if(!area){ toast("未识别到区域，请扫码进入"); return; }
  const inspector = $("inspector").value.trim();
  if(!inspector){ toast("请填写巡检人姓名"); $("inspector").focus(); return; }
  const done = Object.values(itemState).filter(s=>s.status).length;
  if(done < CONFIG.ITEMS.length){ toast("请完成全部检查项"); return; }

  const btn = $("submitBtn");
  btn.disabled = true; btn.textContent = "提交中…";

  const items = CONFIG.ITEMS.map((name,i)=>({ name, status: itemState[i].status, desc: itemState[i].desc }));
  const failCount = items.filter(x=>x.status==="fail").length;
  const payload = {
    area, inspector,
    time: $("timeNow").textContent,
    items, remark: $("remark").value.trim(),
    photos: photos.slice(),
    failCount, submitAt: new Date().toISOString()
  };

  localStorage.setItem("env_inspector", inspector);
  let ok = false, msg = "";
  try{
    if(CONFIG.API_ENDPOINT){
      const r = await fetch(CONFIG.API_ENDPOINT, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      });
      ok = r.ok; msg = ok ? "" : ("服务器返回 "+r.status);
    }else{
      // 本地演示模式
      const list = JSON.parse(localStorage.getItem("env_records")||"[]");
      list.unshift({ id: Date.now(), ...payload, photos: photos.slice() });
      localStorage.setItem("env_records", JSON.stringify(list));
      ok = true;
    }
    // 可选：推送到企业微信群机器人
    if(CONFIG.WECOM_WEBHOOK){
      pushWeCom(payload).catch(()=>{});
    }
  }catch(err){ ok = false; msg = err.message || "网络异常"; }

  btn.disabled = false; btn.textContent = "提交巡检";

  if(ok){
    showOk(payload, failCount);
    resetForm();
  }else{
    toast("提交失败：" + (msg || "请检查网络"));
  }
}

async function pushWeCom(p){
  const text = `【环境巡检】\n区域：${p.area}\n巡检人：${p.inspector}\n时间：${p.time}\n不合格项：${p.failCount} 个\n备注：${p.remark || "无"}`;
  const content = { msgtype:"text", text:{ content } };
  // 带图用 image 类型（需先上传素材，此处简化为文字通知）
  await fetch(CONFIG.WECOM_WEBHOOK, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(content) });
}

function resetForm(){
  renderItems();
  photos = []; renderPhotos();
  $("remark").value = "";
  updateProgress();
  window.scrollTo({top:0, behavior:"smooth"});
}

function showOk(p, fail){
  $("okTip").textContent = fail===0 ? "全部合格，感谢巡检" : `发现 ${fail} 处不合格，已记录待整改`;
  $("okSum").innerHTML = `
    <div><span>区域</span><b>${p.area}</b></div>
    <div><span>巡检人</span><b>${p.inspector}</b></div>
    <div><span>时间</span><b>${p.time}</b></div>
    <div><span>合格</span><b class="pass">${p.items.length-fail} 项</b></div>
    <div><span>不合格</span><b class="fail-n">${fail} 项</b></div>
    <div><span>照片</span><b>${p.photos.length} 张</b></div>
  `;
  $("okOverlay").classList.add("show");
}
function closeOk(){ $("okOverlay").classList.remove("show"); }

/* 历史 */
function openHistory(){
  const list = JSON.parse(localStorage.getItem("env_records")||"[]");
  const box = $("histList");
  if(list.length===0){
    box.innerHTML = `<div class="hist-empty">还没有巡检记录<br>提交一次就会出现在这里</div>`;
  }else{
    box.innerHTML = list.map(r=>`
      <div class="hist-card">
        <div class="hc-top">
          <span class="hc-area">${r.area}</span>
          <span class="hc-time">${r.time}</span>
        </div>
        <div class="hc-meta">
          <span>${r.inspector}</span>
          <span class="pass">合格 ${r.items.length - r.failCount}</span>
          ${r.failCount? `<span class="fail">不合格 ${r.failCount}</span>`:""}
          ${r.photos.length? `<span>照片 ${r.photos.length}</span>`:""}
        </div>
        ${r.remark? `<div style="margin-top:7px;font-size:12px;color:#888">备注：${r.remark}</div>`:""}
        ${r.failCount? `<div style="margin-top:7px;font-size:12px;color:#c00">${r.items.filter(x=>x.status==='fail').map(x=>'· '+x.name+(x.desc?('：'+x.desc):'')).join('<br>')}</div>`:""}
      </div>
    `).join("") + `<div class="hist-clear" onclick="clearHistory()">清空本地记录</div>`;
  }
  $("histOverlay").classList.add("show");
}
function closeHistory(){ $("histOverlay").classList.remove("show"); }
function clearHistory(){
  if(confirm("确定清空本机所有巡检记录？此操作不可恢复。")){
    localStorage.removeItem("env_records");
    openHistory();
  }
}

let toastTimer;
function toast(t){
  const el = $("toast");
  el.textContent = t; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 1800);
}

init();

/* 二维码生成 */
function toggleQR(){
  const p = $("qrPanel");
  p.classList.toggle("show");
  // 自动填当前地址
  if(p.classList.contains("show") && !$("qrBaseUrl").value){
    const u = location.href.replace(/[?&]area=[^&]*/,"").replace(/\?$/,"");
    $("qrBaseUrl").value = u;
  }
}
function genQRCodes(){
  let base = $("qrBaseUrl").value.trim();
  const names = $("qrAreas").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(!base){ alert("请先填写页面地址"); return; }
  if(!names.length){ alert("请输入至少一个区域名称"); return; }
  if(base.indexOf("?")>0) base = base.slice(0, base.indexOf("?"));
  const g = $("qrGrid"); g.innerHTML = "";
  names.forEach(name=>{
    const url = base + "?area=" + encodeURIComponent(name);
    const card = document.createElement("div");
    card.className = "qr-card";
    const qid = "qr-"+Math.random().toString(36).slice(2);
    card.innerHTML = `<div id="${qid}"></div><div class="n">${name}</div><div class="u">${url}</div>`;
    g.appendChild(card);
    new QRCode(document.getElementById(qid), { text:url, width:120, height:120, correctLevel:QRCode.CorrectLevel.M });
  });
}
function clearQRCodes(){ $("qrGrid").innerHTML = '<div class="qr-empty">填好地址和区域名，点生成</div>'; }
</script>
